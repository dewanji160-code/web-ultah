<!DOCTYPE html>
<html>
<head>
<title>Birthday</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
color:white;
font-family:sans-serif;
}

.box{
text-align:center;
}

h1{
animation:pulse 2s infinite;
}

button{
padding:12px 25px;
cursor:pointer;
}

#pesan{
margin-top:20px;
font-size:24px;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}

body::before{
content:"❤️ ❤️ ❤️ ❤️ ❤️";
position:absolute;
top:-100px;
font-size:40px;
width:100%;
animation:fall 8s linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(120vh);
}
}
</style>
</head>

<body>

<div class="box">

<h1>Happy Birthday ❤️</h1>

<button onclick="surprise()">
Klik Aku
</button>

<p id="pesan"></p>

</div>

<script>

function surprise(){

document
.getElementById("pesan")
.innerHTML=

"✨ Selamat ulang tahun 🌸";

}

</script>

</body>
</html>
